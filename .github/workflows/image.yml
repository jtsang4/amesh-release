name: image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* release tag to build an image for"
        required: true
        type: string
      latest:
        description: "Also move the latest tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/jtsang4/amesh

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          case "$tag" in
            v*) ;;
            *) echo "tag must start with v" >&2; exit 1 ;;
          esac
          echo "TAG=$tag" >> "$GITHUB_ENV"
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"
          tags="$IMAGE:${tag#v}"
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ inputs.latest }}" = "true" ]; then
            tags="$tags,$IMAGE:latest"
          fi
          echo "TAGS=$tags" >> "$GITHUB_ENV"

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/linux_amd64 build/linux_arm64
          gh release download "$TAG" \
            --pattern 'amesh_linux_*.tar.gz' \
            --pattern 'checksums.txt' \
            --dir build
          (cd build && grep 'amesh_linux_.*\.tar\.gz$' checksums.txt | sha256sum -c -)
          tar -xzf build/amesh_linux_amd64.tar.gz -C build/linux_amd64
          tar -xzf build/amesh_linux_arm64.tar.gz -C build/linux_arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.TAGS }}
          labels: |
            org.opencontainers.image.title=amesh
            org.opencontainers.image.description=amesh hub
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=https://github.com/jtsang4/amesh-release
